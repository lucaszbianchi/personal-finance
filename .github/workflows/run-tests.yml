name: Run Unit Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Unit Tests and Coverage
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.11' ]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest with coverage
        run: |
          pytest tests/ --cov=services --cov=repositories --cov=utils --cov-report=xml --cov-report=term-missing
        continue-on-error: false

      - name: Check overall coverage threshold (47%)
        run: |
          coverage report --fail-under=47

      - name: Check new code coverage (52%)
        if: github.event_name == 'pull_request'
        run: |
          diff-cover coverage.xml --compare-branch=origin/${{ github.base_ref }} --fail-under=52
        continue-on-error: true

      - name: Generate coverage report
        if: always()
        run: |
          coverage report --include=services/*,repositories/*,utils/*
