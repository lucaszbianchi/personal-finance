<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2em; }
        nav { display: flex; gap: 2em; margin-bottom: 2em; }
        .nav-item { background: #f0f0f0; padding: 1em 2em; border-radius: 8px; font-size: 1.2em; }
        h1 { margin-bottom: 1em; }
    </style>
    <button onclick="window.location.href='dataframe.html'">Ir para Dataframe</button>
    <button onclick="importData()">Importar Dados</button>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>
    <h1>Summary <span id="summary-date">09/2025</span></h1>
    <nav>
        <div class="nav-item">Income: <span id="income">R$ 0,00</span></div>
        <div class="nav-item">Expenses: <span id="expenses">R$ 0,00</span></div>
        <div class="nav-item">Balance: <span id="balance">R$ 0,00</span></div>
        <div class="nav-item">Average Spending: <span id="avg-spending">R$ 0,00</span></div>
        <div class="nav-item">Salary: <span id="salary">R$ 0,00</span></div>
        <div class="nav-item">Investments: <span id="investments">R$ 0,00</span></div>
    </nav>
    <!-- Containers para os gráficos -->
    <div style="display:flex;gap:2em;">
        <div id="bank_pie" style="width:45%;"></div>
        <div id="credit_pie" style="width:45%;"></div>
    </div>
    <div id="line_chart" style="width:90%;height:400px;margin-top:2em;"></div>
<script>
    function formatBRL(value) {
        return value.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }
    async function importData() {
        const res = await fetch('/import-data', { method: 'POST' });
        if (res.ok) {
            alert('Dados importados com sucesso!');
            location.reload();
        } else {
            alert('Erro ao importar dados.');
        }
    }

    async function fetchSummary() {
        const res = await fetch('/summary');
        const data = await res.json();

        document.getElementById('summary-date').textContent = data.month;
        document.getElementById('income').textContent = formatBRL(data.income);
        document.getElementById('expenses').textContent = formatBRL(data.expenses);
        document.getElementById('balance').textContent = formatBRL(data.balance);
        document.getElementById('avg-spending').textContent = formatBRL(data.avg_spending);
        document.getElementById('salary').textContent = formatBRL(data.salary);
        document.getElementById('investments').textContent = formatBRL(data.investments);
    }
    fetchSummary();

    // Gráficos
    async function plotCharts() {
        const res = await fetch('/dashboard-data');
        const data = await res.json();

        // Piechart banking
        Plotly.newPlot('bank_pie', [{
            type: 'pie',
            labels: data.bank_pie.map(x => x.category),
            values: data.bank_pie.map(x => x.total),
            textinfo: "label+percent",
        }], {title: "Gastos Banking por Categoria"});

        // Piechart credit
        Plotly.newPlot('credit_pie', [{
            type: 'pie',
            labels: data.credit_pie.map(x => x.category),
            values: data.credit_pie.map(x => x.total),
            textinfo: "label+percent",
        }], {title: "Gastos Credit por Categoria"});

        // Line chart
        Plotly.newPlot('line_chart', [
            {
                x: data.line_data.map(x => x.month),
                y: data.line_data.map(x => x.expenses),
                name: "Despesas",
                type: "scatter",
                mode: "lines+markers",
                line: {color: "red"}
            },
            {
                x: data.line_data.map(x => x.month),
                y: data.line_data.map(x => x.income),
                name: "Receitas",
                type: "scatter",
                mode: "lines+markers",
                line: {color: "green"}
            }
        ], {title: "Despesas/Receitas por Mês (BRL)", yaxis: {title: "BRL"}, xaxis: {title: "Mês"}});
    }
    plotCharts();
</script>
</body>
</html>
