<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2em; }
        nav { display: flex; gap: 2em; margin-bottom: 2em; }
        .nav-item { background: #f0f0f0; padding: 1em 2em; border-radius: 8px; font-size: 1.2em; }
        h1 { margin-bottom: 1em; }
    </style>
    <button onclick="window.location.href='/static/dataframe.html'">Ir para Dataframe</button>
    <button onclick="importData()">Importar Dados</button>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>
    <h1>Summary <span id="summary-date">09/2025</span></h1>
    <nav>
        <div class="nav-item">Income: <span id="income">R$ 0,00</span></div>
        <div class="nav-item">Expenses: <span id="expenses">R$ 0,00</span></div>
        <div class="nav-item">Balance: <span id="balance">R$ 0,00</span></div>
        <div class="nav-item">Investments: <span id="investments">R$ 0,00</span></div>
    </nav>
    <!-- Containers para os gráficos -->
    <div style="display:flex;gap:2em;">
        <div id="category_pie" style="width:90%;"></div>
    </div>
    <div id="line_chart" style="width:90%;height:400px;margin-top:2em;"></div>
<script>
    function formatBRL(value) {
        return value.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }
    async function importData() {
        const res = await fetch('/api/import/data', { method: 'POST' });
        if (res.ok) {
            alert('Dados importados com sucesso!');
            location.reload();
        } else {
            alert('Erro ao importar dados.');
        }
    }

    async function fetchSummary() {
        // Pega o primeiro e último dia do mês atual
        const now = new Date();
        const firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
        const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0);
        
        // Formata as datas como YYYY-MM-DD
        const start_date = firstDay.toISOString().split('T')[0];
        const end_date = lastDay.toISOString().split('T')[0];
        
        const res = await fetch(`/api/summary/full?start_date=${start_date}&end_date=${end_date}`, { 
            method: 'GET' 
        });
        const data = await res.json();

        document.getElementById('summary-date').textContent = `${(now.getMonth() + 1).toString().padStart(2, '0')}/${now.getFullYear()}`;
        document.getElementById('income').textContent = formatBRL(data.totals.income);
        document.getElementById('expenses').textContent = formatBRL(data.totals.expenses);
        document.getElementById('balance').textContent = formatBRL(data.totals.balance);
        document.getElementById('investments').textContent = formatBRL(data.totals.investments);
    }
    fetchSummary();

    // Gráficos
    async function plotCharts() {
        try {
            const res = await fetch('/api/dashboard/data');
            if (!res.ok) {
                throw new Error('Falha ao buscar dados do dashboard');
            }
            const data = await res.json();
            console.log('Dados recebidos:', data); // Para debug

            // Piechart de categorias
        if (data.category_pie && Array.isArray(data.category_pie)) {
            Plotly.newPlot('category_pie', [{
                type: 'pie',
                labels: data.category_pie.map(x => x.category),
                values: data.category_pie.map(x => x.total),
                textinfo: "label+percent",
            }], {title: "Gastos por Categoria"});
        } else {
            console.error('Dados de categorias não encontrados ou em formato inválido:', data);
        }

        // Line chart
        Plotly.newPlot('line_chart', [
            {
                x: data.line_data.map(x => x.month),
                y: data.line_data.map(x => x.expenses),
                name: "Despesas",
                type: "scatter",
                mode: "lines+markers",
                line: {color: "red"}
            },
            {
                x: data.line_data.map(x => x.month),
                y: data.line_data.map(x => x.income),
                name: "Receitas",
                type: "scatter",
                mode: "lines+markers",
                line: {color: "green"}
            }
        ], {title: "Despesas/Receitas por Mês (BRL)", yaxis: {title: "BRL"}, xaxis: {title: "Mês"}});
        } catch (error) {
            console.error('Erro ao plotar gráficos:', error);
        }
    }
    plotCharts();
</script>
</body>
</html>
